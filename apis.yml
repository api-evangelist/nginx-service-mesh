apis:
  - aid: nginx-service-mesh:control-plane-api
    name: NGINX Service Mesh Control Plane API
    description: >-
      The NGINX Service Mesh control plane exposes a REST API used by the
      `nginx-meshctl` CLI to manage mesh configuration, sidecar injection,
      certificate authority operations, traffic policies, and resource lookups.
      The API is internal to the cluster and is not published as a public
      OpenAPI document; its surface is documented through the API Usage guide
      and the `nginx-meshctl` reference.
