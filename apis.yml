aid: nginx-service-mesh
name: NGINX Service Mesh
description: >-
  NGINX Service Mesh (NSM) is a service mesh from F5 NGINX powered by NGINX Plus,
  designed to manage container-to-container traffic in Kubernetes environments.
  It provides mTLS, traffic policies via the Service Mesh Interface (SMI),
  traffic splitting, rate limiting, observability (Prometheus, Grafana, Jaeger),
  and integration with NGINX Plus Ingress Controller. NGINX Service Mesh exposes
  a control-plane REST API and a `nginx-meshctl` CLI for installation, sidecar
  injection, certificate management, and policy configuration. The upstream
  GitHub repository is archived; F5 announced End of Sale (EoS) for the NGINX
  Microservices Bundle as of July 1, 2023, and the project's successor for
  ingress and L7 routing is NGINX Gateway Fabric.
